name: Weekday Developer Activity

on:
  schedule:
    # Runs Monday–Friday multiple times to simulate different activity times
    - cron: '0 4 * * 1-5'
    - cron: '30 6 * * 1-5'
    - cron: '0 9 * * 1-5'
    - cron: '0 12 * * 1-5'
  workflow_dispatch:

jobs:
  developer-activity:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Git
        run: |
          git config --global user.name "prem7475"
          git config --global user.email "premnarayani1682@gmail.com"

      - name: Random activity generator
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |

          TODAY=$(date +'%Y-%m-%d')
          ACTION=$((RANDOM % 4))

          echo "Today's activity type: $ACTION"

          # -----------------------
          # 0 = Commit contribution
          # -----------------------
          if [ "$ACTION" -eq 0 ]; then

            FILE="dev-notes.md"
            touch $FILE

            if ! grep -q "$TODAY" $FILE 2>/dev/null; then
              echo "- Development update $TODAY" >> $FILE
              git add $FILE
              git commit -m "feat: development update $TODAY"
              git push origin main
            else
              echo "Already committed today"
            fi

          fi


          # -----------------------
          # 1 = Create Issue
          # -----------------------
          if [ "$ACTION" -eq 1 ]; then

            TITLE="Bug investigation $TODAY"
            BODY="Investigating potential issue in module on $TODAY."

            curl -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/issues \
              -d "{\"title\":\"$TITLE\",\"body\":\"$BODY\"}"

          fi


          # -----------------------
          # 2 = Create Pull Request
          # -----------------------
          if [ "$ACTION" -eq 2 ]; then

            BRANCH="update-$RANDOM"

            git checkout -b $BRANCH

            FILE="updates.md"
            echo "Minor improvement on $TODAY" >> $FILE

            git add $FILE
            git commit -m "chore: improvement $TODAY"
            git push origin $BRANCH

            curl -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              https://api.github.com/repos/${{ github.repository }}/pulls \
              -d "{
                \"title\":\"Auto improvement $TODAY\",
                \"head\":\"$BRANCH\",
                \"base\":\"main\",
                \"body\":\"Automated improvement activity.\"
              }"

          fi


          # -----------------------
          # 3 = Code Review (comment)
          # -----------------------
          if [ "$ACTION" -eq 3 ]; then

            ISSUE_NUM=$(curl -s \
              -H "Authorization: token $GH_TOKEN" \
              https://api.github.com/repos/${{ github.repository }}/issues \
              | jq '.[0].number')

            if [ "$ISSUE_NUM" != "null" ]; then

              curl -X POST \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github+json" \
                https://api.github.com/repos/${{ github.repository }}/issues/$ISSUE_NUM/comments \
                -d "{\"body\":\"Reviewed and noted on $TODAY\"}"

            else
              echo "No issues to review"
            fi

          fi